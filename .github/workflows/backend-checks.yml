name: Backend checks

on:
  push:
  pull_request:

jobs:
  php-syntax:
    name: PHP syntax
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.3', '8.4', '8.5']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: dom, libxml, simplexml
          coverage: none

      - name: PHP syntax
        run: find ncc_backend_4mc -name "*.php" -print0 | xargs -0 -n1 php -l

  backend-static:
    name: Backend static checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, libxml, simplexml
          coverage: none

      - name: Backend static checks
        run: php scripts/check-backend-static.php

  backend-schema:
    name: Backend schema checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Backend schema checks
        run: php scripts/check-backend-schema.php

  backend-l10n:
    name: Backend l10n checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Backend l10n checks
        run: node scripts/check-backend-l10n.mjs

  js-syntax:
    name: JS syntax
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: JS syntax
        run: node scripts/check-backend-js.mjs

  phpunit:
    name: PHPUnit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.3', '8.4', '8.5']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: dom, libxml, simplexml
          coverage: none

      - name: Install PHP test tools
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: PHPUnit
        run: vendor/bin/phpunit
