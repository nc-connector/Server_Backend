name: Bug report
description: Report a reproducible Backend problem
title: "[Bug]: "
labels: ["bug", "product: backend"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem.

        Please keep this short and practical. Do not paste app passwords, tokens, private keys, or full customer data.

        Admin documentation: https://github.com/nc-connector/Server_Backend/blob/main/Doku/admin.md
  - type: checkboxes
    id: quick-checks
    attributes:
      label: Quick checks
      options:
        - label: I searched existing issues first.
          required: true
        - label: For setup or policy problems, I checked the admin documentation linked above.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the visible problem.
      placeholder: The admin page loads, but ...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Write the shortest path that triggers the problem.
      placeholder: |
        1. Open Nextcloud admin settings ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: I expected ...
    validations:
      required: true
  - type: input
    id: backend-version
    attributes:
      label: NC Connector Backend version
      placeholder: 1.2.1
    validations:
      required: true
  - type: input
    id: nextcloud-version
    attributes:
      label: Nextcloud version
      placeholder: 32.0.0, 33.0.1, 34.0.0, ...
    validations:
      required: true
  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: 8.3, 8.4, ...
    validations:
      required: true
  - type: dropdown
    id: license-mode
    attributes:
      label: License mode
      options:
        - Community
        - Pro license
        - Test license
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Admin UI
        - Seats / Licensing
        - Sharing policies / templates
        - Talk policies / templates
        - Email signatures
        - Admin delegation
        - Update check
        - API
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Add relevant Nextcloud logs, browser console output, or screenshots. Remove passwords, tokens, and private data.
      render: text